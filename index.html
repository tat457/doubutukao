```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>どうぶつ進化ゲーム</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    overflow:hidden;
    background:#87ceeb;
    touch-action:none;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    user-select:none;
}

canvas{
    display:block;
    width:100vw;
    height:100vh;
    background:linear-gradient(#87ceeb 0%,#dff7ff 46%,#f7dfae 46%,#f5c16c 100%);
}

#score{
    position:absolute;
    top:10px;
    left:10px;
    z-index:2;
    min-width:92px;
    font-size:28px;
    font-weight:800;
    color:#333;
    background:rgba(255,255,255,.9);
    padding:8px 15px;
    border-radius:14px;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
}

#next{
    position:absolute;
    top:10px;
    right:10px;
    z-index:2;
    font-size:18px;
    font-weight:800;
    color:#333;
    background:rgba(255,255,255,.9);
    padding:8px 14px;
    border-radius:14px;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
}

#message{
    position:absolute;
    inset:0;
    z-index:3;
    display:none;
    align-items:center;
    justify-content:center;
    padding:24px;
    background:rgba(0,0,0,.45);
}

#message.show{
    display:flex;
}

.panel{
    width:min(90vw,380px);
    text-align:center;
    color:#333;
    background:rgba(255,255,255,.96);
    padding:28px 24px;
    border-radius:24px;
    box-shadow:0 16px 48px rgba(0,0,0,.25);
}

.panel h1{
    margin:0 0 10px;
    font-size:34px;
}

.panel p{
    margin:8px 0 20px;
    font-size:18px;
    font-weight:700;
}

.panel button{
    appearance:none;
    border:0;
    border-radius:999px;
    background:#ff9f1c;
    color:#fff;
    font-size:18px;
    font-weight:800;
    padding:12px 24px;
    cursor:pointer;
    box-shadow:0 6px 0 #d97706;
}

.panel button:active{
    transform:translateY(4px);
    box-shadow:0 2px 0 #d97706;
}
</style>
</head>
<body>

<div id="score">0</div>
<div id="next">NEXT 🐭</div>
<div id="message" aria-live="polite">
    <div class="panel">
        <h1>ゲームオーバー</h1>
        <p id="finalScore">スコア 0</p>
        <button id="restart" type="button">もう一度</button>
    </div>
</div>
<canvas id="game"></canvas>

<script>
(() => {
    "use strict";

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const nextEl = document.getElementById("next");
    const messageEl = document.getElementById("message");
    const finalScoreEl = document.getElementById("finalScore");
    const restartBtn = document.getElementById("restart");

    const animals = [
        "🐭","🐹","🐰","🐱","🐶",
        "🦊","🐼","🐻","🐨","🐷",
        "🐸","🐵","🦁","🐯","🐮",
        "🐲","🦄","🐳"
    ];

    const gravity = 0.28;
    const airDrag = 0.998;
    const groundFriction = 0.88;
    const wallFriction = 0.45;
    const orangeStartRatio = 0.46;
    const spawnY = 58;
    const spawnCooldownMs = 420;
    const spawnSafeMs = 900;
    const gameOverHoldMs = 900;
    const maxBalls = 180;

    let width = 0;
    let height = 0;
    let score = 0;
    let balls = [];
    let nextLevel = 0;
    let lastSpawnAt = 0;
    let gameOver = false;
    let dangerStartedAt = 0;
    let audioContext = null;
    let isPressing = false;
    let pressX = 0;

    function resize(){
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function clamp(value, min, max){
        return Math.max(min, Math.min(max, value));
    }

    function getOrangeStartY(){
        return height * orangeStartRatio;
    }

    function getRadius(level){
        return 22 + level * 5.2;
    }

    function initAudio(){
        if(audioContext) return;
        const AudioCtor = window.AudioContext || window.webkitAudioContext;
        if(!AudioCtor) return;
        audioContext = new AudioCtor();
    }

    function playSound(type){
        initAudio();
        if(!audioContext) return;

        const now = audioContext.currentTime;
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();

        const sound = {
            drop: { frequency: 360, endFrequency: 220, duration: 0.08, volume: 0.08, wave: "sine" },
            merge: { frequency: 520, endFrequency: 880, duration: 0.16, volume: 0.12, wave: "triangle" },
            over: { frequency: 180, endFrequency: 70, duration: 0.45, volume: 0.16, wave: "sawtooth" }
        }[type];

        if(!sound) return;

        oscillator.type = sound.wave;
        oscillator.frequency.setValueAtTime(sound.frequency, now);
        oscillator.frequency.exponentialRampToValueAtTime(sound.endFrequency, now + sound.duration);

        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(sound.volume, now + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + sound.duration);

        oscillator.connect(gain);
        gain.connect(audioContext.destination);
        oscillator.start(now);
        oscillator.stop(now + sound.duration + 0.03);
    }

    class AnimalBall{
        constructor(x, y, level){
            this.x = x;
            this.y = y;
            this.level = clamp(level, 0, animals.length - 1);
            this.radius = getRadius(this.level);
            this.vx = (Math.random() - 0.5) * 1.4;
            this.vy = 0;
            this.remove = false;
            this.createdAt = performance.now();
        }

        update(){
            this.vy += gravity;
            this.vx *= airDrag;

            this.x += this.vx;
            this.y += this.vy;

            if(this.x < this.radius){
                this.x = this.radius;
                this.vx = Math.abs(this.vx) * wallFriction;
            }

            if(this.x > width - this.radius){
                this.x = width - this.radius;
                this.vx = -Math.abs(this.vx) * wallFriction;
            }

            if(this.y > height - this.radius){
                this.y = height - this.radius;
                this.vy = 0;
                this.vx *= groundFriction;
            }
        }

        draw(){
            const fontSize = this.radius * 1.85;

            ctx.save();
            ctx.font = `${fontSize}px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.shadowColor = "rgba(0,0,0,.22)";
            ctx.shadowBlur = 8;
            ctx.shadowOffsetY = 3;
            ctx.fillText(animals[this.level], this.x, this.y + this.radius * 0.02);
            ctx.restore();
        }
    }

    function chooseNextLevel(){
        const roll = Math.random();
        if(roll > 0.94) return 2;
        if(roll > 0.78) return 1;
        return 0;
    }

    function updateNext(){
        nextEl.textContent = `NEXT ${animals[nextLevel]}`;
    }

    function spawn(x){
        const now = performance.now();
        if(gameOver || balls.length >= maxBalls || now - lastSpawnAt < spawnCooldownMs) return;

        const radius = getRadius(nextLevel);
        const safeX = clamp(Number.isFinite(x) ? x : width / 2, radius, width - radius);

        balls.push(new AnimalBall(safeX, spawnY, nextLevel));
        lastSpawnAt = now;
        nextLevel = chooseNextLevel();
        updateNext();
        playSound("drop");
    }

    function mergeCheck(){
        const additions = [];

        for(let i = 0; i < balls.length; i++){
            const a = balls[i];
            if(a.remove) continue;

            for(let j = i + 1; j < balls.length; j++){
                const b = balls[j];
                if(b.remove || a.level !== b.level) continue;

                const dx = b.x - a.x;
                const dy = b.y - a.y;
                const dist = Math.hypot(dx, dy);

                if(dist < (a.radius + b.radius) * 0.76){
                    if(a.level < animals.length - 1){
                        const merged = new AnimalBall(
                            (a.x + b.x) / 2,
                            (a.y + b.y) / 2,
                            a.level + 1
                        );
                        merged.vx = (a.vx + b.vx) * 0.35;
                        merged.vy = Math.min((a.vy + b.vy) * 0.15, 1.5);
                        additions.push(merged);

                        score += (a.level + 1) * 10;
                        scoreEl.textContent = score;
                        playSound("merge");
                    }

                    a.remove = true;
                    b.remove = true;
                    break;
                }
            }
        }

        balls = balls.filter(ball => !ball.remove);
        if(additions.length > 0){
            balls.push(...additions);
        }
    }

    function collision(){
        for(let i = 0; i < balls.length; i++){
            for(let j = i + 1; j < balls.length; j++){
                const a = balls[i];
                const b = balls[j];
                const dx = b.x - a.x;
                const dy = b.y - a.y;
                const dist = Math.hypot(dx, dy);
                const min = a.radius + b.radius;

                if(dist > 0 && dist < min){
                    const overlap = (min - dist) / 2;
                    const nx = dx / dist;
                    const ny = dy / dist;

                    a.x -= nx * overlap;
                    a.y -= ny * overlap;
                    b.x += nx * overlap;
                    b.y += ny * overlap;

                    const relativeVelocity = (b.vx - a.vx) * nx + (b.vy - a.vy) * ny;
                    if(relativeVelocity < 0){
                        const impulse = relativeVelocity * 0.18;
                        a.vx += impulse * nx;
                        a.vy += impulse * ny;
                        b.vx -= impulse * nx;
                        b.vy -= impulse * ny;
                    }
                }
            }
        }
    }

    function drawBox(){
        const orangeStartY = getOrangeStartY();

        ctx.save();
        ctx.strokeStyle = "rgba(160,74,20,.95)";
        ctx.lineWidth = 8;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(4, orangeStartY);
        ctx.lineTo(4, height - 4);
        ctx.lineTo(width - 4, height - 4);
        ctx.lineTo(width - 4, orangeStartY);
        ctx.stroke();
        ctx.restore();
    }

    function isStacked(ball){
        if(ball.y + ball.radius >= height - 8){
            return true;
        }

        return balls.some(other => {
            if(other === ball || other.remove || other.y <= ball.y) return false;

            const dx = other.x - ball.x;
            const dy = other.y - ball.y;
            const distance = Math.hypot(dx, dy);
            const touching = distance <= ball.radius + other.radius + 6;
            const aboveOther = ball.y + ball.radius <= other.y + other.radius;

            return touching && aboveOther;
        });
    }

    function checkGameOver(){
        if(gameOver) return;

        const now = performance.now();
        const orangeStartY = getOrangeStartY();
        const stackedOverLine = balls.some(ball => {
            const oldEnough = now - ball.createdAt > spawnSafeMs;
            return oldEnough && ball.y - ball.radius <= orangeStartY && isStacked(ball);
        });

        if(!stackedOverLine){
            dangerStartedAt = 0;
            return;
        }

        if(dangerStartedAt === 0){
            dangerStartedAt = now;
            return;
        }

        if(now - dangerStartedAt >= gameOverHoldMs){
            endGame();
        }
    }

    function endGame(){
        gameOver = true;
        finalScoreEl.textContent = `スコア ${score}`;
        messageEl.classList.add("show");
        playSound("over");
    }

    function restart(){
        balls = [];
        score = 0;
        nextLevel = 0;
        lastSpawnAt = 0;
        gameOver = false;
        dangerStartedAt = 0;
        isPressing = false;
        scoreEl.textContent = "0";
        updateNext();
        messageEl.classList.remove("show");
    }

    function gameLoop(){
        ctx.clearRect(0, 0, width, height);
        drawBox();

        if(!gameOver){
            if(isPressing){
                spawn(pressX);
            }

            for(const ball of balls){
                ball.update();
            }
            collision();
            mergeCheck();
            checkGameOver();
        }

        for(const ball of balls){
            ball.draw();
        }

        requestAnimationFrame(gameLoop);
    }

    function startPress(event){
        event.preventDefault();
        if(audioContext && audioContext.state === "suspended"){
            audioContext.resume();
        }
        isPressing = true;
        pressX = event.clientX;
        spawn(pressX);
    }

    function movePress(event){
        if(!isPressing) return;
        event.preventDefault();
        pressX = event.clientX;
    }

    function endPress(){
        isPressing = false;
    }

    canvas.addEventListener("pointerdown", startPress, { passive:false });
    canvas.addEventListener("pointermove", movePress, { passive:false });
    canvas.addEventListener("pointerup", endPress);
    canvas.addEventListener("pointercancel", endPress);
    canvas.addEventListener("pointerleave", endPress);

    restartBtn.addEventListener("click", restart);
    window.addEventListener("resize", resize);

    resize();
    updateNext();
    gameLoop();
})();
</script>

</body>
</html>
```
